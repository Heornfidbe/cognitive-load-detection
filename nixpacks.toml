providers = ["python"]

[phases.setup]
nixPkgs = ["python312", "gcc", "glib", "libGL"]

[phases.install]
cmds = [
    "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
    ". /opt/venv/bin/activate && pip uninstall -y opencv-python opencv-contrib-python || true"
]
